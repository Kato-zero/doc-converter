# render.yaml
services:
  - type: web
    name: document-converter-backend
    runtime: image
    repo: https://github.com/YOUR_USERNAME/YOUR_REPO_NAME
    plan: free
    dockerCommand: |
      apt-get update && apt-get install -y libreoffice
      cd backend && npm install && node server.js
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
